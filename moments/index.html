    <style>
        .contribute-btn {
            position: fixed;
            bottom: 28px;
            left: 28px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            z-index: 999;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
            
        body.light .contribute-btn {
            background: rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.10);
            color: #555;
            box-shadow: 0 4px 16px rgba(0,0,0,0.10);
        }
        
        body.dark .contribute-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: #aaa;
            box-shadow: 0 4px 16px rgba(0,0,0,0.40);
        }
        .contribute-btn:hover {
            transform: scale(1.08);
        }
    </style>

<body class="light">


<!-- Floating Pill -->
<div class="floating-pill" id="floatingPill">

<button class="theme-toggle" id="navThemeBtn" aria-label="Toggle Theme"><i class="fa-solid fa-moon"></i></button>

<main>
    <!-- ── GALLERY ────────────────────────────────── -->
    <section class="section" id="gallery" style="padding-top:calc(var(--nav-height) + 2rem); padding-bottom:6rem;">
        <h2 class="section-title">Gallery</h2>
        <div class="moments-filters" id="momentsFilters">
            <button class="moments-filter moments-filter--active" data-filter="all">All</button>
            <button class="moments-filter" data-filter="momen"><i class="fa-solid fa-handshake"></i> Momen</button>
            <button class="moments-filter" data-filter="photography"><i class="fa-solid fa-camera"></i> Photography</button>
            <button class="moments-filter" data-filter="personal"><i class="fa-solid fa-user"></i> Personal</button>
        </div>
        
        <div class="moments-grid" id="momentsGrid">            
        
        </div>

    </section>

    <!-- ── FEEDBACK ──────────────────────────────── -->
    <section id="feedback" class="section">
        <h2 class="section-title">Leave a Feedback</h2>
        <div class="feedback-wrapper">
            <div class="glass-card feedback-form-card">
                <p class="feedback-desc">Got something to say? Drop a message — it shows up instantly.</p>
                <div class="feedback-form">
                    <input type="text" id="feedbackName" placeholder="Your name" class="feedback-input" maxlength="50"/>
                    <input type="text" id="feedbackFrom" placeholder="from where you know this guy? " class="feedback-input" maxlength="80"/>
                    <textarea id="feedbackMessage" placeholder="Your message..." class="feedback-input feedback-textarea" maxlength="300" rows="3"></textarea>
                    <button id="feedbackSubmit" class="btn btn-primary feedback-btn"><i class="fa-solid fa-paper-plane"></i> Send Message</button>
                </div>
            </div>
            <div id="feedbackList" class="feedback-list">
                <div class="feedback-empty" id="feedbackEmpty">
                    <p>No feedback yet. Be the first!</p>
                </div>
            </div>
        </div>
    </section>

    <div class="lightbox" id="lightbox">
        <button class="lightbox__close" id="lightboxClose">✕</button>
        <button class="lightbox__nav lightbox__nav--prev" id="lightboxPrev">‹</button>
        <button class="lightbox__nav lightbox__nav--next" id="lightboxNext">›</button>
        <img class="lightbox__img" id="lightboxImg" src="" alt="">
        <p class="lightbox__caption" id="lightboxCaption"></p>
    </div>

    <footer class="footer" style="padding-bottom:5rem;">
        <p>&copy; 2026 Fakhrul Mukhlisin.</p>
    </footer>

<!-- Floating pill -->
<script>
(function() {
    const pill = document.getElementById('floatingPill');
    if (!pill) return;
    const update = () => pill.classList.toggle('visible', window.scrollY > 200);
    window.addEventListener('scroll', update, { passive: true });
    update();
})();
</script>

<!-- Auto-filter from URL param -->
<script>
window.addEventListener('DOMContentLoaded', () => {
    const filter = new URLSearchParams(window.location.search).get('filter');
    if (filter && filter !== 'all') {
        const btn = document.querySelector(`.moments-filter[data-filter="${filter}"]`);
        if (btn) btn.click();
    }
});
</script>
